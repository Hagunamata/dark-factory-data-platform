# ==============================================================================
# Dark Factory Data Platform — docker-compose.yml
# ==============================================================================
# One-command bring-up of the full batch pipeline stack described in
# docs/01-conception.md §3:
#
#   Sources → Kafka → Postgres (raw) → Spark → Postgres (analytics)
#                  Airflow (orchestration), ELK (logs)
#
# Image versions are pinned so the stack is reproducible. Health-aware
# dependencies ensure services come up in the right order.
# ==============================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  image: dark-factory/airflow:2.9.3
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
    # Connection params reused by DAGs
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    KAFKA_TOPIC_LOGISTICS: ${KAFKA_TOPIC_LOGISTICS}
    KAFKA_TOPIC_HRSS: ${KAFKA_TOPIC_HRSS}
    POSTGRES_HOST: postgres
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    SPARK_MASTER_URL: ${SPARK_MASTER_URL}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./spark/jobs:/opt/spark/jobs:ro
    - airflow_logs:/opt/airflow/logs
  networks:
    - darkfactory

services:

  # ----------------------------------------------------------------------------
  # Ingestion: Apache Kafka (KRaft mode, single combined broker+controller)
  # ----------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7.1
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft (no Zookeeper) — single-node combined controller + broker.
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Auto-create topics so producers don't fail on first publish during demo.
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - darkfactory
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------------------------
  # Storage: PostgreSQL (hosts darkfactory + airflow databases)
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:16.4
    container_name: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - darkfactory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Processing: Apache Spark (single-node master + one worker)
  # ----------------------------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5.3
    container_name: spark-master
    restart: unless-stopped
    ports:
      - "8081:8080"   # Spark master UI (8081 on host to avoid clash with Airflow)
      - "7077:7077"   # Spark master RPC
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    volumes:
      - ./spark/jobs:/opt/jobs:ro
    networks:
      - darkfactory
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  spark-worker:
    image: bitnami/spark:3.5.3
    container_name: spark-worker
    restart: unless-stopped
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    volumes:
      - ./spark/jobs:/opt/jobs:ro
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - darkfactory

  # ----------------------------------------------------------------------------
  # Orchestration: Apache Airflow (LocalExecutor)
  # One-shot init runs `db migrate` and creates the admin user, then exits.
  # ----------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_WWW_USER_USERNAME}" \
          --password "${AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin --lastname User \
          --role Admin --email admin@darkfactory.local || true
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Observability: ELK stack
  # ----------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    restart: unless-stopped
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      # Single-node dev heap. Lower if your machine is tight on RAM.
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - darkfactory
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    restart: unless-stopped
    ports:
      - "5044:5044"   # beats input (Phase 2: filebeat)
      - "5000:5000"   # tcp input fallback
    volumes:
      - ./elk/logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - darkfactory

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    restart: unless-stopped
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - darkfactory

  # ----------------------------------------------------------------------------
  # Data generator (idle container; `make seed` execs into it)
  # ----------------------------------------------------------------------------
  data-generator:
    build:
      context: .
      dockerfile: data_generator/Dockerfile
    image: dark-factory/data-generator:latest
    container_name: data-generator
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_LOGISTICS: ${KAFKA_TOPIC_LOGISTICS}
      KAFKA_TOPIC_HRSS: ${KAFKA_TOPIC_HRSS}
      GENERATOR_LOGISTICS_ROWS: ${GENERATOR_LOGISTICS_ROWS}
      GENERATOR_HRSS_ROWS: ${GENERATOR_HRSS_ROWS}
      GENERATOR_TIME_WINDOW_MONTHS: ${GENERATOR_TIME_WINDOW_MONTHS}
    # Stay alive so `make seed` can exec the bootstrap module on demand.
    command: ["sleep", "infinity"]
    volumes:
      - ./data_generator:/app/data_generator:ro
      - ./sample_data:/app/sample_data:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - darkfactory

# ==============================================================================
# Networks and volumes
# ==============================================================================

networks:
  darkfactory:
    driver: bridge

volumes:
  kafka_data:
  postgres_data:
  elasticsearch_data:
  airflow_logs:
