# ==============================================================================
# Dark Factory Data Platform — docker-compose.yml
# ==============================================================================
# This is a Phase 2 starter skeleton. Image versions, ports, healthchecks, and
# per-service environment variables are TODOs to be filled in during development.
# The shape (services, dependencies, networks, volumes) reflects the Phase 1
# architecture decisions documented in docs/01-conception.md.
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  # Ingestion: Apache Kafka (KRaft mode, no Zookeeper)
  # ----------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7  # TODO: pin to a specific minor version that's stable
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # TODO: configure KRaft mode environment variables
      # See: https://github.com/bitnami/containers/tree/main/bitnami/kafka
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      # ... more KRaft config
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - darkfactory
    # TODO: healthcheck

  # ----------------------------------------------------------------------------
  # Storage: PostgreSQL (raw + analytics schemas)
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - darkfactory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Processing: Apache Spark (single-node)
  # ----------------------------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5  # TODO: pin version
    container_name: spark-master
    ports:
      - "8081:8080"   # Spark master UI
      - "7077:7077"   # Spark master RPC
    environment:
      SPARK_MODE: master
    volumes:
      - ./spark/jobs:/opt/jobs:ro
    networks:
      - darkfactory

  spark-worker:
    image: bitnami/spark:3.5
    container_name: spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
    depends_on:
      - spark-master
    networks:
      - darkfactory

  # ----------------------------------------------------------------------------
  # Orchestration: Apache Airflow (LocalExecutor)
  # ----------------------------------------------------------------------------
  # TODO: Airflow needs its own metadata Postgres instance OR a dedicated schema.
  # Use the official airflow docker-compose.yaml as a reference:
  # https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/
  airflow-webserver:
    image: apache/airflow:2.9.0  # TODO: confirm stable version
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - darkfactory
    # TODO: init container for airflow db migrate and user create

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: airflow-scheduler
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-webserver
    networks:
      - darkfactory

  # ----------------------------------------------------------------------------
  # Observability: ELK stack
  # ----------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0  # TODO: pin
    container_name: elasticsearch
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - darkfactory

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logstash
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      - elasticsearch
    networks:
      - darkfactory

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - darkfactory

  # ----------------------------------------------------------------------------
  # Data generator + producers (custom service, built from local Dockerfile)
  # ----------------------------------------------------------------------------
  data-generator:
    build:
      context: .
      dockerfile: data_generator/Dockerfile
    container_name: data-generator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_LOGISTICS: ${KAFKA_TOPIC_LOGISTICS}
      KAFKA_TOPIC_HRSS: ${KAFKA_TOPIC_HRSS}
      GENERATOR_LOGISTICS_ROWS: ${GENERATOR_LOGISTICS_ROWS}
      GENERATOR_HRSS_ROWS: ${GENERATOR_HRSS_ROWS}
      GENERATOR_TIME_WINDOW_MONTHS: ${GENERATOR_TIME_WINDOW_MONTHS}
    volumes:
      - ./data_generator:/app/data_generator:ro
      - ./sample_data:/app/sample_data:ro
    depends_on:
      - kafka
    networks:
      - darkfactory

# ==============================================================================
# Networks and volumes
# ==============================================================================

networks:
  darkfactory:
    driver: bridge

volumes:
  kafka_data:
  postgres_data:
  elasticsearch_data:
  airflow_logs:
